# FoldForge control-plane stack for a SHARED host (e.g. the AWS EC2 box that already
# runs other compose projects). Differs from docker-compose.yml (the Hetzner app-node
# stack) in three deliberate ways, to coexist with whatever else is on the host:
#
#   1. Images come from GHCR by default (pushed by each repo's CI on main), so a
#      deploy is `pull` + `up` — no on-host compile. Each service ALSO has a `build:`
#      fallback from its sibling repo, so `up --build` still works offline / for local
#      changes (clone with --recurse-submodules for the Rust repos):
#         <root>/orchestrator   (has ./proto submodule)
#         <root>/gateway        (has ./proto submodule)
#         <root>/console
#         <root>/infra          (this file lives here)
#      Pin a specific build with ORCHESTRATOR_TAG / GATEWAY_TAG / CONSOLE_TAG
#      (default: latest); CI also tags each image sha-<full-commit> for immutability.
#   2. NO caddy — ports 80/443 are already taken on a shared host. The gateway is
#      published on a high port (GATEWAY_HOST_PORT, default 18080) and the console on
#      CONSOLE_HOST_PORT (default 13000). Reach them via SSH tunnel, or open the port
#      in the security group + put TLS in front later.
#   3. postgres does NOT publish 5432 to the host (another postgres may own it). It is
#      reachable only on the compose-internal network as `postgres:5432`.
#
# Orchestrator runs the GPU-FREE mock runner, so the whole control plane comes up and
# the API works end-to-end with NO GPU and NO object store. Swap RUNNER + add the
# sidecar endpoints + R2/S3 creds when real inference is wired.
#
# Usage (compose is available under sudo on this host):
#   cd <root>/infra/compose
#   cp ec2.env.example .env        # set POSTGRES_PASSWORD + API_TOKEN
#   # Pull mode (default, fast — images from GHCR; needs `docker login ghcr.io`
#   # if the packages are private):
#   sudo docker compose -f docker-compose.ec2.yml --env-file .env pull
#   sudo docker compose -f docker-compose.ec2.yml --env-file .env up -d
#   # Build mode (offline / local changes):
#   sudo docker compose -f docker-compose.ec2.yml --env-file .env up -d --build
#   curl localhost:${GATEWAY_HOST_PORT:-18080}/v1/healthz

name: foldforge

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-foldforge}
    volumes:
      - foldforge_pg:/var/lib/postgresql/data
    # NOTE: no `ports:` — internal-only, so it can't collide with a host 5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object store for synthetic mock artifacts (so the console 3D viewer + download
  # work with no GPU). Internal-only — no host port, reached as minio:9000 on the
  # compose network, so it can't collide with anything on the host.
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - foldforge_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket the gateway serves + the mock runner uploads to.
  # Idempotent; exits 0 once the bucket exists. No app-code bucket management.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${R2_BUCKET:-foldforge} &&
      echo 'bucket ready'"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
      R2_BUCKET: ${R2_BUCKET:-foldforge}
    restart: "no"

  orchestrator:
    image: ghcr.io/foldforge/orchestrator:${ORCHESTRATOR_TAG:-latest}
    build:
      context: ../../orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      FOLDFORGE_ORCH__DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foldforge}
      FOLDFORGE_ORCH__BIND_ADDR: 0.0.0.0:50051
      # GPU-free mock runner: the full DAG executes deterministically, no sidecars.
      FOLDFORGE_ORCH__RUNNER: mock
      # Object store for synthetic artifact uploads (so the console viewer works).
      # Same creds/bucket the gateway reads — one .env configures both.
      FOLDFORGE_ORCH__R2_ENDPOINT: http://minio:9000
      FOLDFORGE_ORCH__R2_REGION: ${R2_REGION:-auto}
      FOLDFORGE_ORCH__R2_BUCKET: ${R2_BUCKET:-foldforge}
      FOLDFORGE_ORCH__R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set in .env}
      FOLDFORGE_ORCH__R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set in .env}
      # Billing (BILLING-plan): dark-launched OFF by default; set BILLING_ENABLED=true
      # in .env to charge submits. price_per_step is a placeholder until GPU-seconds
      # are measured (clamped [0, 1e6] at load).
      FOLDFORGE_ORCH__BILLING_ENABLED: ${BILLING_ENABLED:-false}
      FOLDFORGE_ORCH__PRICE_PER_STEP: ${PRICE_PER_STEP:-10}
    # No host port — gateway reaches it as orchestrator:50051 on the compose network.

  gateway:
    image: ghcr.io/foldforge/gateway:${GATEWAY_TAG:-latest}
    build:
      context: ../../gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - orchestrator
    environment:
      FOLDFORGE_GATEWAY__BIND_ADDR: 0.0.0.0:8080
      FOLDFORGE_GATEWAY__ORCHESTRATOR_ENDPOINT: http://orchestrator:50051
      FOLDFORGE_GATEWAY__API_TOKEN: ${API_TOKEN:?set in .env}
      # Per-user API keys + quotas. Required for billing (a per-tenant principal comes
      # from a per-user key; the static admin token has no principal and is unbilled).
      FOLDFORGE_GATEWAY__API_KEYS_ENABLED: ${API_KEYS_ENABLED:-false}
      # Object store the artifact-download endpoint signs + streams from. Same
      # MinIO the orchestrator's mock runner uploads to — one .env, both services.
      FOLDFORGE_GATEWAY__R2_ENDPOINT: http://minio:9000
      FOLDFORGE_GATEWAY__R2_REGION: ${R2_REGION:-auto}
      FOLDFORGE_GATEWAY__R2_BUCKET: ${R2_BUCKET:-foldforge}
      FOLDFORGE_GATEWAY__R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set in .env}
      FOLDFORGE_GATEWAY__R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set in .env}
    ports:
      # Host:Container — high host port to avoid 80/443/8080 collisions.
      - "${GATEWAY_HOST_PORT:-18080}:8080"

  console:
    image: ghcr.io/foldforge/console:${CONSOLE_TAG:-latest}
    build:
      context: ../../console
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      # The console's server-side proxy reaches the gateway over the compose
      # network (NOT the host's published port). Token is injected server-side,
      # never sent to the browser.
      NEXT_PUBLIC_GATEWAY_URL: http://gateway:8080
      GATEWAY_API_TOKEN: ${API_TOKEN:?set in .env}
    ports:
      # High host port to avoid collisions; reach it via an SSH tunnel.
      - "${CONSOLE_HOST_PORT:-13000}:3000"

volumes:
  foldforge_pg:
  foldforge_minio:
